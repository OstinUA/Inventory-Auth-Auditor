name: AI Wiki Analysis solo

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to write about'
        required: true
        type: choice
        options:
          - Architecture
          - Setup-and-Configuration
          - How-It-Works
          - Security
          - Contributing
          - API-Reference
          - Troubleshooting
          - Changelog

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Collect repo files
        run: |
          python - <<'EOF'
          import os, json

          INCLUDE_EXT = {'.py', '.js', '.ts', '.yml', '.yaml', '.md', '.json', '.sh'}
          EXCLUDE_DIRS = {'.git', 'node_modules', 'venv', '__pycache__', '.github'}

          files = {}
          for root, dirs, filenames in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS]
              for fname in filenames:
                  ext = os.path.splitext(fname)[1]
                  if ext not in INCLUDE_EXT:
                      continue
                  path = os.path.join(root, fname).lstrip('./')
                  try:
                      with open(os.path.join(root, fname), 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read(3000)
                      files[path] = content
                  except:
                      pass

          with open('/tmp/repo_files.json', 'w') as f:
              json.dump(files, f)
          print(f"Collected {len(files)} files")
          EOF

      - name: Generate wiki page via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          python - <<'EOF'
          import os, json, requests, time

          with open('/tmp/repo_files.json') as f:
              files = json.load(f)

          file_dump = ""
          for path, content in files.items():
              file_dump += f"\n\n### {path}\n```\n{content}\n```"
              if len(file_dump) > 80000:
                  file_dump += "\n\n[truncated...]"
                  break

          topic = os.environ['TOPIC']

          topic_prompts = {
              "Architecture": "Describe the project architecture: key files, how they interact, data flow, design decisions. No fluff.",
              "Setup-and-Configuration": "Describe how to set up the project: prerequisites, installation steps, all env variables and secrets with explanations.",
              "How-It-Works": "Explain step-by-step how the system works at runtime: triggers, logic flow, API calls, outputs.",
              "Security": "Analyze security aspects: what secrets are used, how auth works, potential risks, recommendations.",
              "Contributing": "Write a contributing guide: how to run locally, code style, PR process, testing.",
              "API-Reference": "Document all external APIs used: endpoints, payloads, response formats, error handling.",
              "Troubleshooting": "List common problems and their solutions based on the codebase logic.",
              "Changelog": "Summarize what this project does and list key features as a changelog-style entry.",
          }

          instruction = topic_prompts.get(topic, "Write a focused wiki page about this topic.")

          prompt = f"""Write a GitHub Wiki page about "{topic}" for this repository.

          Instructions: {instruction}

          Rules:
          - Max 400 words
          - Use markdown headers (##, ###)
          - Be specific to THIS codebase, not generic
          - No intro like "This page covers..." — start directly with content
          - Do not repeat the page title as H1

          Repository contents:
          {file_dump}
          """

          headers = {"Content-Type": "application/json"}
          payload = {"contents": [{"parts": [{"text": prompt}]}]}
          models = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]

          result = None
          for model in models:
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={os.environ['GEMINI_API_KEY']}"
              for attempt in range(3):
                  try:
                      resp = requests.post(url, json=payload, headers=headers, timeout=120)
                      if resp.status_code == 429:
                          time.sleep(15 * (2 ** attempt))
                          continue
                      resp.raise_for_status()
                      result = resp.json()['candidates'][0]['content']['parts'][0]['text'].strip()
                      break
                  except Exception as e:
                      print(f"[{model}] attempt {attempt+1} failed: {e}")
                      time.sleep(10)
              if result:
                  break

          if not result:
              exit(1)

          with open('/tmp/wiki_page.md', 'w') as f:
              f.write(result)
          EOF

      - name: Push page and update Table of Contents
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ github.event.inputs.topic }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" /tmp/wiki
          cd /tmp/wiki

          cp /tmp/wiki_page.md "${TOPIC}.md"

          python3 - <<'PYEOF'
          import os

          wiki_dir = "/tmp/wiki"
          toc_file = os.path.join(wiki_dir, "Table-of-Contents.md")

          pages = sorted([
              f[:-3] for f in os.listdir(wiki_dir)
              if f.endswith(".md") and f != "Table-of-Contents.md"
          ])

          lines = ["# Table of Contents\n"]
          lines.append("_Auto-generated index of all wiki pages._\n")
          lines.append("")

          for page in pages:
              display = page.replace("-", " ")
              lines.append(f"- [{display}]({page})")

          with open(toc_file, "w") as f:
              f.write("\n".join(lines))
          PYEOF

          git add .
          git diff --cached --quiet && exit 0
          git commit -m "wiki: add ${TOPIC} + update Table of Contents"
          git push
